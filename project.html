/* ================= PAGE ================= */

.project-section{
    padding:80px 30px;
    color:white;
}

.page-title{
    text-align:center;
    font-size:45px;
    margin-bottom:50px;
}

/* ================= WEEK GRID ================= */

.week-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* ================= WEEK CARD ================= */

.week-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(125,249,255,0.2);
    border-radius:15px;
    overflow:hidden;
    backdrop-filter:blur(10px);
    transition:.3s;
}

.week-card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px cyan;
}

/* ================= WEEK BUTTON ================= */

.week-btn{
    width:100%;
    background:none;
    border:none;
    color:white;
    font-size:24px;
    padding:20px;
    cursor:pointer;
    text-align:center;
}

/* ================= DAYS ================= */

.days{
    display:none;
    padding:15px;
}

/* ================= DAY GRID ================= */

.day-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

/* ================= DAY CARD ================= */

.day-card{
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    overflow:hidden;
}

/* ================= DAY BUTTON ================= */

.day-btn{
    width:100%;
    background:none;
    border:none;
    color:#7df9ff;
    padding:15px;
    cursor:pointer;
    font-size:16px;
}

/* ================= LINKS ================= */

.links{
    display:none;
    padding:10px 15px;
}

/* ================= LINK STYLE ================= */

.links a{
    display:block;
    color:white;
    text-decoration:none;
    margin:8px 0;
    font-size:14px;
}

.links a:hover{
    color:#7df9ff;
}

</style>

</head>

<script>

/* ================= SIDEBAR ================= */

function toggleMenu(){

    const sidebar = document.getElementById("sidebar");

    if(sidebar.style.left === "0px"){
        sidebar.style.left = "-250px";
    }
    else{
        sidebar.style.left = "0px";
    }
}

/* ================= WEEK TOGGLE ================= */

function toggleWeek(id){

    const week = document.getElementById(id);

    if(week.style.display === "block"){
        week.style.display = "none";
    }
    else{
        week.style.display = "block";
    }
}

/* ================= DAY TOGGLE ================= */

function toggleDay(id){

    const day = document.getElementById(id);

    if(day.style.display === "block"){
        day.style.display = "none";
    }
    else{
        day.style.display = "block";
    }
}

</script>
